name: Fadesol TaskFlow CI

on:
  push:
    branches:
      - main
      - mouhcine
      - MOUNIM
      - test
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  backend-check:
    name: Backend Compile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          for file in backend/services/*/requirements.txt; do
            echo "Installing $file"
            pip install -r "$file"
          done

      - name: Compile backend services
        run: python -m compileall backend/services

  docker-check:
    name: Docker Compose Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build